# Supply-chain: 9-day minimum release age for new resolutions.
# Cutover: "*" grandfathers the existing lockfile at policy enable (one-time).
# Forward: dep-updater enforces 9 days; Dependabot cooldown is one day later.

packages:
  - '.'

minimumReleaseAge: 12960
minimumReleaseAgeStrict: false
minimumReleaseAgeExclude:
  - "*"
