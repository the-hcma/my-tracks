# Supply-chain: 10-day minimum release age for new resolutions.
# Grandfather: "*" skips age checks until tracked excludes are built.
# Lockfile had 274 pinned package@version entries when last synced.
# Regenerate: scripts/grandfather-pnpm-release-age
# Age out excludes: scripts/prune-pnpm-release-age-grandfather
# Dependabot cooldown + dep-updater enforce 10 days on new non-CVE bumps.

packages:
  - '.'

minimumReleaseAge: 14400
minimumReleaseAgeStrict: false
minimumReleaseAgeExclude:
  - "*"
