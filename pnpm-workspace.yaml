# Supply-chain: 10-day minimum release age for new resolutions.
# Cutover: "*" grandfathers the existing lockfile at policy enable (one-time).
# Forward: Dependabot cooldown + dep-updater enforce 10 days on new non-CVE bumps.

packages:
  - '.'

minimumReleaseAge: 14400
minimumReleaseAgeStrict: false
minimumReleaseAgeExclude:
  - "*"
