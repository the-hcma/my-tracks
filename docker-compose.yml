services:
  my-tracks:
    build: .
    image: ghcr.io/the-hcma/my-tracks:latest
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mytracks}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-mytracks}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Ports are internal — nginx handles external access.
    # MQTT TLS (8883) is exposed directly via nginx stream passthrough.
    expose:
      - "8080"
      - "8883"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mytracks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-mytracks}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mytracks}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1-alpine
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
      - "${MQTT_TLS_PORT:-8883}:8883"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ${CERTS_DIR:-./certs}:/etc/nginx/certs:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - my-tracks
    restart: unless-stopped

  # Optional: Let's Encrypt certificate management.
  # Issue:  docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d your.domain.com
  # Renew: docker compose run --rm certbot renew
  # After issue/renew, copy certs to CERTS_DIR:
  #   cp /etc/letsencrypt/live/<domain>/fullchain.pem ./certs/
  #   cp /etc/letsencrypt/live/<domain>/privkey.pem ./certs/
  #   docker compose exec nginx nginx -s reload
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    profiles:
      - certbot

volumes:
  postgres-data:
  app-data:
  letsencrypt:
  certbot-www:
