worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

# MQTT TLS passthrough (TCP stream, not HTTP)
stream {
    # Per-IP connection limit for MQTT TLS (mitigates connection flooding)
    limit_conn_zone $binary_remote_addr zone=mqtt:10m;

    server {
        listen 8883;
        proxy_pass my-tracks:8883;
        proxy_connect_timeout 5s;
        proxy_timeout 3600s;

        limit_conn mqtt 10;
        limit_conn_log_level warn;
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 1m;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=commands:10m rate=10r/m;

    # Per-IP connection limit for HTTP (covers WebSocket slot exhaustion)
    limit_conn_zone $binary_remote_addr zone=http:10m;

    upstream app {
        server my-tracks:8080;
    }

    # HTTP → HTTPS redirect + ACME challenge
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Cap concurrent connections per IP to limit WebSocket slot exhaustion
        limit_conn http 50;

        # Login — rate limited
        location /login/ {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://app;
            include /etc/nginx/proxy_params;
        }

        # Command API — rate limited (brute-force protection for API key)
        location /api/commands/ {
            limit_req zone=commands burst=5 nodelay;
            proxy_pass http://app;
            include /etc/nginx/proxy_params;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Static files — add cache headers
        location /static/ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # Everything else
        location / {
            proxy_pass http://app;
            include /etc/nginx/proxy_params;
        }
    }
}
