[project]
name = "my-tracks"
version = "0.1.0"
description = "Self-hosted location tracking backend for OwnTracks"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "django>=5.2.12,<6",
    "djangorestframework>=3.14.0",
    "python-decouple>=3.8",
    "psycopg2-binary>=2.9.9",
    "gunicorn>=21.2.0",
    "channels>=4.0.0",
    "daphne>=4.0.0",
    "whitenoise>=6.11.0",
    "typer>=0.15.0",
    "amqtt",
    "cryptography>=46.0.4",
    "dj-database-url>=3.1.2",
]

[project.optional-dependencies]
dev = [
    "netifaces>=0.11.0",
    "pytest>=7.4.0",
    "pytest-django>=4.5.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.0",
    "flake8>=6.1.0",
    "black>=23.7.0",
    "isort>=5.12.0",
    "mypy>=1.5.0",
    "pyright>=1.1.0",
    "shellcheck-py>=0.9.0",
    "pip-audit>=2.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["config", "my_tracks"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
testpaths = ["tests/python"]
python_files = ["test_*.py", "*_test.py"]
addopts = "-v -n auto"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore::ResourceWarning",
]

[tool.coverage.run]
source = ["my_tracks"]

[tool.black]
line-length = 88
target-version = ['py314']

[tool.mypy]
python_version = "3.14"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true


[dependency-groups]
dev = [
    "coverage-enable-subprocess>=1.0",
    "pyhamcrest>=2.1.0",
    "pytest-xdist>=3.8.0",
]
