name: CI

on:
  # Run on every PR event and on direct pushes to feature branches.
  # The push trigger catches cases where a branch is restacked without
  # generating a new PR synchronize event (e.g. `gt sync` when the remote
  # already has the rebased commit). The concurrency group below deduplicates
  # simultaneous push + pull_request runs for the same commit.
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - '**/graphite-base/**'
  push:
    branches-ignore:
      - main
      - '**/graphite-base/**'
  schedule:
    # Weekly full suite — catches regressions between PRs.
    # Thursday 07:00 UTC. CVEs are checked daily in cve-check.yml.
    - cron: '0 7 * * 4'
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR when a newer one starts.
# For pull_request events the group is per-PR; for push events it is per-branch.
# This also deduplicates simultaneous push + pull_request runs for the same SHA.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.set-skip.outputs.skip }}
    steps:
      # Fetch PR state with automatic retries so transient GitHub API errors
      # (e.g. 504) don't fail the Guard job and block the merge queue.
      - id: pr-state
        uses: nick-fields/retry@v3
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        with:
          timeout_seconds: 15
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            if [[ -z "$PR_NUMBER" ]]; then exit 0; fi
            state=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json state -q .state)
            echo "state=$state" >> "$GITHUB_OUTPUT"

      - id: set-skip
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
          PR_STATE: ${{ steps.pr-state.outputs.state }}
        run: |
          # Skip merge-queue staging branches — the merge queue validates the
          # integrated state itself; CI there duplicates work.
          # Skip when the PR is already merged — Graphite pushes a restack
          # commit to the next branch after a merge lands, which would otherwise
          # trigger a redundant CI run on an already-validated diff.
          if [[ "$HEAD_REF" == gtmq_merge_* ]] || [[ "$PR_STATE" == "MERGED" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  frontend:
    name: Frontend (TypeScript)
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Set up pnpm
      uses: pnpm/action-setup@v6
      with:
        version: '10.28.0'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: TypeScript type check
      run: pnpm run typecheck

    - name: ESLint check
      run: pnpm run lint

    - name: Build TypeScript
      run: pnpm run build

    - name: Run TypeScript tests
      run: pnpm run test

  backend-lint:
    name: Backend Lint
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Verify Python version matches latest stable
      run: |
        CURRENT_VERSION=$(uv run python --version | cut -d' ' -f2 | cut -d'.' -f1,2)
        REQUIRED_VERSION="3.14"
        if [ "$CURRENT_VERSION" != "$REQUIRED_VERSION" ]; then
          echo "❌ Python version mismatch: using $CURRENT_VERSION but required $REQUIRED_VERSION"
          echo "Please update .github/workflows/ci.yml and pyproject.toml to use Python $CURRENT_VERSION"
          exit 1
        fi
        echo "✅ Using Python $CURRENT_VERSION (latest stable)"

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Check import sorting with isort
      run: uv run isort --check-only --diff app config web_ui

    - name: Lint with flake8
      run: uv run flake8 --config dev-tooling/.flake8 app config

    - name: Check type annotations with Pyright
      run: |
        uv run pyright
        echo "✅ All type annotations are complete and correct"

    - name: Check for pending migrations
      run: uv run python manage.py makemigrations --check --dry-run

  backend-test:
    name: Backend Tests
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Set up pnpm
      uses: pnpm/action-setup@v6
      with:
        version: '10.28.0'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Build frontend assets
      run: pnpm install --frozen-lockfile && pnpm run build

    - name: Run migrations
      run: uv run python manage.py migrate

    - name: Collect static files
      run: uv run python manage.py collectstatic --noinput

    - name: Run tests with coverage
      run: uv run pytest --cov=app --cov-fail-under=90 --cov-report=term-missing

    - name: Django deployment hardening check
      run: uv run python manage.py check --deploy
      env:
        DEBUG: "False"
        SECRET_KEY: "ci-placeholder-not-a-real-secret-but-long-enough-for-django"
        ALLOWED_HOSTS: "example.com"
        SECURE_SSL_REDIRECT: "True"
        SESSION_COOKIE_SECURE: "True"
        CSRF_COOKIE_SECURE: "True"

  secret-scan:
    name: Secret Scan
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install gitleaks
      run: |
        ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
        FALLBACK_VERSION=8.30.0
        VERSION=$(curl -sf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
        VERSION=${VERSION:-$FALLBACK_VERSION}
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_${ARCH}.tar.gz" \
          | tar -xz gitleaks
        sudo mv gitleaks /usr/local/bin/

    - name: Scan for leaked secrets
      run: |
        BASE="${{ github.event.pull_request.base.sha }}"
        HEAD="${{ github.event.pull_request.head.sha }}"
        if [ -n "$BASE" ] && [ -n "$HEAD" ]; then
          gitleaks detect --source . --log-opts "${BASE}..${HEAD}"
        else
          gitleaks detect --source .
        fi

  workflow-lint:
    name: Workflow Lint (actionlint)
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Lint GitHub Actions workflows
      uses: rhysd/actionlint@v1.7.12

  shell-test:
    name: Shell Script Tests
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Set up pnpm
      uses: pnpm/action-setup@v6
      with:
        version: '10.28.0'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Build frontend assets
      run: pnpm install --frozen-lockfile && pnpm run build

    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Set up database
      run: uv run python manage.py migrate

    - name: Run shell script tests
      run: ./tests/bash/test-my-tracks-server
