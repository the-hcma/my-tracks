name: CI

on:
  # Run on every PR event and on direct pushes to feature branches.
  # The push trigger catches cases where a branch is restacked without
  # generating a new PR synchronize event (e.g. `gt sync` when the remote
  # already has the rebased commit). The guard job skips push CI when a
  # pull_request workflow is already queued for the same SHA (see below).
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - '**/graphite-base/**'
  push:
    branches-ignore:
      - main
      - '**/graphite-base/**'
  schedule:
    # Weekly full suite — catches regressions between PRs.
    # Thursday 07:00 UTC. CVEs are checked daily in cve-check.yml.
    - cron: '0 7 * * 4'
  workflow_dispatch:

# Cancel in-progress reruns within the same event type only. push and pull_request
# must not share a group: cancel-in-progress would leave CANCELLED required checks
# on the PR commit and block merge even when pull_request CI passed.
concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  guard:
    name: Guard
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.set-skip.outputs.skip }}
    steps:
      # Fetch PR state with automatic retries so transient GitHub API errors
      # (e.g. 504) don't fail the Guard job and block the merge queue.
      - id: pr-state
        uses: nick-fields/retry@v4
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        with:
          timeout_seconds: 15
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            if [[ -z "$PR_NUMBER" ]]; then exit 0; fi
            state=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json state -q .state)
            echo "state=$state" >> "$GITHUB_OUTPUT"

      - id: set-skip
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
          PR_STATE: ${{ steps.pr-state.outputs.state }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip merge-queue staging branches — the merge queue validates the
          # integrated state itself; CI there duplicates work.
          # Skip when the PR is already merged — Graphite pushes a restack
          # commit to the next branch after a merge lands, which would otherwise
          # trigger a redundant CI run on an already-validated diff.
          if [[ "$HEAD_REF" == gtmq_merge_* ]] || [[ "$PR_STATE" == "MERGED" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip push CI when pull_request CI is already queued for this SHA.
          # Both events fire on every PR-branch push; only pull_request checks
          # should run so we avoid duplicate work without cross-cancelling runs.
          # If no pull_request run appears (e.g. gt sync restack), push CI runs.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
            PR_COUNT=$(gh pr list --repo "$GITHUB_REPOSITORY" \
              --head "${GITHUB_REPOSITORY_OWNER}:${BRANCH}" --state open \
              --json number --jq 'length')
            if [[ "$PR_COUNT" -gt 0 ]]; then
              for _ in 1 2 3 4 5 6; do
                RUNS=$(gh api \
                  "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&event=pull_request&per_page=1" \
                  --jq '.total_count')
                if [[ "$RUNS" -gt 0 ]]; then
                  echo "skip=true" >> "$GITHUB_OUTPUT"
                  echo "Push CI skipped: pull_request workflow covers ${GITHUB_SHA}"
                  exit 0
                fi
                sleep 10
              done
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend (TypeScript)
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Set up pnpm
      uses: pnpm/action-setup@v6.0.8
      with:
        version: '10.28.0'

    - name: Set up Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: TypeScript type check
      run: pnpm run typecheck

    - name: ESLint check
      run: pnpm run lint

    - name: Build TypeScript
      run: pnpm run build

    - name: Run TypeScript tests
      run: pnpm run test

  backend-lint:
    name: Backend Lint
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Verify Python version matches latest stable
      run: |
        CURRENT_VERSION=$(uv run python --version | cut -d' ' -f2 | cut -d'.' -f1,2)
        REQUIRED_VERSION="3.14"
        if [ "$CURRENT_VERSION" != "$REQUIRED_VERSION" ]; then
          echo "❌ Python version mismatch: using $CURRENT_VERSION but required $REQUIRED_VERSION"
          echo "Please update .github/workflows/ci.yml and pyproject.toml to use Python $CURRENT_VERSION"
          exit 1
        fi
        echo "✅ Using Python $CURRENT_VERSION (latest stable)"

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Lint and format check with Ruff
      run: |
        uv run ruff check app config web_ui
        uv run ruff format --check app config web_ui

    - name: Check type annotations with Pyright
      run: |
        uv run pyright
        echo "✅ All type annotations are complete and correct"

    - name: Check for pending migrations
      run: uv run python manage.py makemigrations --check --dry-run

  backend-test:
    name: Backend Tests
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Set up pnpm
      uses: pnpm/action-setup@v6.0.8
      with:
        version: '10.28.0'

    - name: Set up Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Build frontend assets
      run: pnpm install --frozen-lockfile && pnpm run build

    - name: Run migrations
      run: uv run python manage.py migrate

    - name: Collect static files
      run: uv run python manage.py collectstatic --noinput

    - name: Run tests with coverage
      run: uv run pytest --cov=app --cov-fail-under=90 --cov-report=term-missing

    - name: Django deployment hardening check
      run: uv run python manage.py check --deploy
      env:
        DEBUG: "False"
        SECRET_KEY: "ci-placeholder-not-a-real-secret-but-long-enough-for-django"
        ALLOWED_HOSTS: "example.com"
        SECURE_SSL_REDIRECT: "True"
        SESSION_COOKIE_SECURE: "True"
        CSRF_COOKIE_SECURE: "True"

  secret-scan:
    name: Secret Scan
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Secret Scan
        env:
          GITLEAKS_BASE: ${{ github.event.pull_request.base.sha || '' }}
          GITLEAKS_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash .github/ci/secret-scan
  workflow-lint:
    name: Workflow Lint (actionlint)
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Lint GitHub Actions workflows
      uses: rhysd/actionlint@v1.7.12

  shell-test:
    name: Shell Script Tests
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Set up pnpm
      uses: pnpm/action-setup@v6.0.8
      with:
        version: '10.28.0'

    - name: Set up Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Build frontend assets
      run: pnpm install --frozen-lockfile && pnpm run build

    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Set up database
      run: uv run python manage.py migrate

    - name: Run shell script tests
      run: ./tests/bash/test-my-tracks-server
