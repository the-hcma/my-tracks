name: CI

on:
  # Run on every PR event and on direct pushes to feature branches.
  # The push trigger catches cases where a branch is restacked without
  # generating a new PR synchronize event. The guard job skips push CI when a
  # pull_request workflow is already queued for the same SHA (see below).
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches-ignore:
      # Transitional: legacy Graphite restack bases (safe to remove after cleanup).
      - '**/graphite-base/**'
  push:
    branches-ignore:
      - main
      - '**/graphite-base/**'
      # GitHub merge queue temporary branches — use merge_group, not push.
      - 'gh-readonly-queue/**'
  merge_group:
  schedule:
    # Weekly full suite — catches regressions between PRs.
    # Thursday 07:00 UTC. CVEs are checked daily in cve-check.yml.
    - cron: '0 7 * * 4'
  workflow_dispatch:

# Cancel in-progress reruns for the same trigger only. push and pull_request must
# not share a group: cancel-in-progress would leave CANCELLED required checks on
# the PR commit and block merge even when pull_request CI passed. pull_request
# actions are also split (opened/synchronize vs edited) so review-bot description
# patches do not cancel an in-flight test run for the same commit.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}-${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}-${{ github.event.action || github.event_name }}
  cancel-in-progress: true
jobs:
  guard:
    permissions:
      contents: read
      pull-requests: read
    name: Guard
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.set-skip.outputs.skip }}
    steps:
      # Fetch PR state with automatic retries so transient GitHub API errors
      # (e.g. 504) don't fail the Guard job and block the merge queue.
      - id: pr-state
        uses: nick-fields/retry@v4
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        with:
          timeout_seconds: 15
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            if [[ -z "$PR_NUMBER" ]]; then exit 0; fi
            state=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json state -q .state)
            echo "state=$state" >> "$GITHUB_OUTPUT"

      - id: set-skip
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
          PR_STATE: ${{ steps.pr-state.outputs.state }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip legacy Graphite MQ staging branches (transitional).
          # Skip when the PR is already merged — a restack push after merge would
          # otherwise trigger a redundant CI run on an already-validated diff.
          if [[ "$HEAD_REF" == gtmq_merge_* ]] || [[ "$PR_STATE" == "MERGED" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi


          # CodeRabbit appends review summaries to the PR description (pull_request
          # edited). We want its review comments only, not a second full CI run.
          if [[ "${{ github.event_name }}" == "pull_request" ]] \
              && [[ "${{ github.event.action }}" == "edited" ]] \
              && [[ "${{ github.event.sender.login }}" == "coderabbitai[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Pull request CI skipped: CodeRabbit description edit (review metadata only)"
            exit 0
          fi
          # Skip push CI when an open PR already covers this branch.
          # GitHub always delivers pull_request synchronize for PR-head pushes;
          # the push trigger is only for restacks without an open PR.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
            PR_COUNT=0
            if count="$(gh pr list --repo "$GITHUB_REPOSITORY" \
                --head "$BRANCH" --state open \
                --json number --jq 'length' 2>/dev/null)"; then
              PR_COUNT="$count"
            fi
            if [[ "$PR_COUNT" -gt 0 ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Push CI skipped: open PR exists; pull_request handles this push"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
  frontend:
    name: Frontend (TypeScript)
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        persist-credentials: false
        ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}

    - name: Set up Node.js
      uses: actions/setup-node@v7.0.0
      with:
        node-version: '22'

    # Corepack from packageManager + pnpm store cache (repository-helpers#362).
    - name: Set up pnpm via Corepack
      uses: the-hcma/repository-helpers/actions/setup-pnpm-corepack@cde3063aa1e030fcac59bbf215131a3bd25d7908

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: TypeScript type check
      run: pnpm run typecheck

    - name: ESLint check
      run: pnpm run lint

    - name: Build TypeScript
      run: pnpm run build

    - name: Run TypeScript tests
      run: pnpm run test

  python-static:
    name: Python lint & format checks
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        persist-credentials: false
        ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        version: "latest"

    - name: Python lint & format checks
      run: bash .github/ci/python-static

    - name: Check for pending migrations
      run: uv run python manage.py makemigrations --check --dry-run

  backend-test:
    name: Backend Tests
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        persist-credentials: false
        ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Set up Node.js
      uses: actions/setup-node@v7.0.0
      with:
        node-version: '22'

    # Corepack from packageManager + pnpm store cache (repository-helpers#362).
    - name: Set up pnpm via Corepack
      uses: the-hcma/repository-helpers/actions/setup-pnpm-corepack@cde3063aa1e030fcac59bbf215131a3bd25d7908

    - name: Build frontend assets
      run: pnpm install --frozen-lockfile && pnpm run build

    - name: Run migrations
      run: uv run python manage.py migrate

    - name: Collect static files
      run: uv run python manage.py collectstatic --noinput

    - name: Run tests with coverage
      run: uv run pytest --cov=app --cov-fail-under=90 --cov-report=term-missing

    - name: Django deployment hardening check
      run: uv run python manage.py check --deploy
      env:
        DEBUG: "False"
        SECRET_KEY: "ci-placeholder-not-a-real-secret-but-long-enough-for-django"
        ALLOWED_HOSTS: "example.com"
        SECURE_SSL_REDIRECT: "True"
        SESSION_COOKIE_SECURE: "True"
        CSRF_COOKIE_SECURE: "True"

  secret-scan:
    name: Secret Scan
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
      - name: Secret Scan
        env:
          GITLEAKS_BASE: ${{ github.event.pull_request.base.sha || '' }}
          GITLEAKS_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash .github/ci/secret-scan
  workflow-lint:
    name: Workflow Lint (actionlint)
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        persist-credentials: false
        ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}

    - name: Lint GitHub Actions workflows
      uses: rhysd/actionlint@v1.7.12

  shell-test:
    name: Shell Script Tests
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        persist-credentials: false
        ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Set up Node.js
      uses: actions/setup-node@v7.0.0
      with:
        node-version: '22'

    # Corepack from packageManager + pnpm store cache (repository-helpers#362).
    - name: Set up pnpm via Corepack
      uses: the-hcma/repository-helpers/actions/setup-pnpm-corepack@cde3063aa1e030fcac59bbf215131a3bd25d7908

    - name: Build frontend assets
      run: pnpm install --frozen-lockfile && pnpm run build

    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Set up database
      run: uv run python manage.py migrate

    - name: Run shell script tests
      run: ./tests/bash/test-my-tracks-server
