name: PR Validation

on:
  # Run on every PR (including Graphite merge queue staging branches, which also
  # open as pull_request events).  We intentionally omit `push: main` because
  # the merge queue already validates the integrated state before landing; a
  # second run after the merge would duplicate work without adding any new
  # signal.
  pull_request:
  schedule:
    # Weekly full suite — catches new CVEs and regressions between PRs.
    # Thursday 07:00 UTC (offset from Monday docker scout scan to spread alerts).
    - cron: '0 7 * * 4'
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: TypeScript type check
      run: npm run typecheck

    - name: ESLint check
      run: npm run lint

    - name: Build TypeScript
      run: npm run build

    - name: Run TypeScript tests
      run: npm run test

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Verify Python version matches latest stable
      run: |
        CURRENT_VERSION=$(uv run python --version | cut -d' ' -f2 | cut -d'.' -f1,2)
        REQUIRED_VERSION="3.14"
        if [ "$CURRENT_VERSION" != "$REQUIRED_VERSION" ]; then
          echo "❌ Python version mismatch: using $CURRENT_VERSION but required $REQUIRED_VERSION"
          echo "Please update .github/workflows/pr-validation.yml and pyproject.toml to use Python $CURRENT_VERSION"
          exit 1
        fi
        echo "✅ Using Python $CURRENT_VERSION (latest stable)"

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Check import sorting with isort
      run: uv run isort --check-only --diff my_tracks config web_ui

    - name: Lint with flake8
      run: uv run flake8 --config dev-tooling/.flake8 my_tracks config

    - name: Check type annotations with Pyright
      run: |
        uv run pyright
        echo "✅ All type annotations are complete and correct"

    - name: Check for pending migrations
      run: uv run python manage.py makemigrations --check --dry-run

    - name: Audit Python dependencies for CVEs
      run: uv run pip-audit

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'

    - name: Build frontend assets
      run: npm ci && npm run build

    - name: Run migrations
      run: uv run python manage.py migrate

    - name: Collect static files
      run: uv run python manage.py collectstatic --noinput

    - name: Run tests with coverage
      run: uv run pytest --cov=my_tracks --cov-fail-under=90 --cov-report=term-missing

    - name: Django deployment hardening check
      run: uv run python manage.py check --deploy
      env:
        DEBUG: "False"
        SECRET_KEY: "ci-placeholder-not-a-real-secret-but-long-enough-for-django"
        ALLOWED_HOSTS: "example.com"
        SECURE_SSL_REDIRECT: "True"
        SESSION_COOKIE_SECURE: "True"
        CSRF_COOKIE_SECURE: "True"

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install gitleaks
      run: |
        ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
        VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_${ARCH}.tar.gz" \
          | tar -xz gitleaks
        sudo mv gitleaks /usr/local/bin/

    - name: Scan for leaked secrets
      run: |
        BASE="${{ github.event.pull_request.base.sha }}"
        HEAD="${{ github.event.pull_request.head.sha }}"
        if [ -n "$BASE" ] && [ -n "$HEAD" ]; then
          gitleaks detect --source . --log-opts "${BASE}..${HEAD}"
        else
          gitleaks detect --source .
        fi

  shell-test:
    name: Shell Script Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'

    - name: Build frontend assets
      run: npm ci && npm run build

    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Run shell script tests
      run: ./tests/bash/test-my-tracks-server
