name: Auto-merge Dependabot PRs

on:
  # pull_request_target runs with the base branch's full-write GITHUB_TOKEN even
  # for Dependabot PRs. The plain `pull_request` event gives Dependabot a
  # read-only token, so label writes and approvals silently fail there.
  # We never check out PR code here, so pull_request_target is safe.
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      # Approve to satisfy the branch protection rule
      # "require approval of the most recent reviewable push".
      # GITHUB_TOKEN (github-actions[bot]) is a different actor from
      # dependabot[bot], so this approval is accepted by GitHub.
      - name: Approve Dependabot PR
        run: gh pr review --approve "$PR_NUMBER" --repo "$REPO"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add merge-mq label to enter merge queue
        run: gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "merge-mq"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
