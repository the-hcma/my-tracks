name: Auto-merge Dependabot PRs

on:
  # pull_request_target runs with the base branch's full-write GITHUB_TOKEN even
  # for Dependabot PRs. The plain `pull_request` event gives Dependabot a
  # read-only token, so auto-merge writes silently fail there.
  # We never check out PR code here, so pull_request_target is safe.
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (GitHub merge queue)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash
