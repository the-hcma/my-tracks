name: Auto-merge Dependabot PRs

on:
  # pull_request_target runs with the base branch's full-write GITHUB_TOKEN even
  # for Dependabot PRs. The plain `pull_request` event gives Dependabot a
  # read-only token, so label writes and approvals silently fail there.
  # We never check out PR code here, so pull_request_target is safe.
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Add merge-mq and merge-it labels to enter merge queue
        run: gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "merge-mq,merge-it"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
